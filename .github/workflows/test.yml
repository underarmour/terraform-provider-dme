name: test
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run unit tests
        run: make test

  acceptance:
    name: Acceptance tests (sandbox)
    runs-on: ubuntu-latest
    if: vars.RUN_ACC_TESTS == 'true' || github.ref == 'refs/heads/master'
    env:
      TF_ACC: "1"
      DME_API_KEY: ${{ secrets.DME_SANDBOX_API_KEY }}
      DME_SECRET_KEY: ${{ secrets.DME_SANDBOX_SECRET_KEY }}
      DME_BASE_URL: https://api.sandbox.dnsmadeeasy.com/V2.0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run acceptance tests
        run: make testacc
        timeout-minutes: 30
