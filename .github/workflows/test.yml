name: test
on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      run_acceptance_tests:
        description: 'Run acceptance tests against the sandbox'
        type: boolean
        required: false
        default: false
      skip_domain_tests:
        description: 'Skip domain lifecycle tests — only applies when acceptance tests are enabled'
        type: boolean
        required: false
        default: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # --- test scope ---
      TF_ACC: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_acceptance_tests == true) && '1' || '' }}
      DME_SKIP_DOMAIN_TESTS: ${{ (github.event_name != 'workflow_dispatch' || inputs.skip_domain_tests) && '1' || '' }}
      GO_TEST_TIMEOUT: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_acceptance_tests == true && inputs.skip_domain_tests == false) && '90m' || (github.event_name == 'workflow_dispatch' && inputs.run_acceptance_tests == true) && '30m' || '10m' }}

      # --- sandbox credentials ---
      DME_API_KEY: ${{ secrets.DME_SANDBOX_API_KEY }}
      DME_SECRET_KEY: ${{ secrets.DME_SANDBOX_SECRET_KEY }}
      DME_BASE_URL: https://api.sandbox.dnsmadeeasy.com/V2.0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run tests
        run: go test $(go list ./... | grep -v /vendor/) -v -timeout $GO_TEST_TIMEOUT -parallel=4
