name: release
on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    name: Full acceptance suite (including domain tests)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      TF_ACC: "1"
      DME_API_KEY: ${{ secrets.DME_SANDBOX_API_KEY }}
      DME_SECRET_KEY: ${{ secrets.DME_SANDBOX_SECRET_KEY }}
      DME_BASE_URL: https://api.sandbox.dnsmadeeasy.com/V2.0
      # DME_SKIP_DOMAIN_TESTS intentionally absent — full suite required for release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
      - name: Run full acceptance suite
        run: go test $(go list ./... | grep -v /vendor/) -v -timeout 90m -parallel=4

  goreleaser:
    name: Publish release
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          version: latest
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
