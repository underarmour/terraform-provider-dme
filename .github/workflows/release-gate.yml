name: release-gate
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  full-acceptance:
    name: Full acceptance suite (including domain tests)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TF_ACC: "1"
      DME_API_KEY: ${{ secrets.DME_SANDBOX_API_KEY }}
      DME_SECRET_KEY: ${{ secrets.DME_SANDBOX_SECRET_KEY }}
      DME_BASE_URL: https://api.sandbox.dnsmadeeasy.com/V2.0
      # DME_SKIP_DOMAIN_TESTS intentionally absent — full suite required for release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run full acceptance suite
        run: make testacc
